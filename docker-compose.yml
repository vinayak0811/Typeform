version: "3.9"

services:
  backend:
    build: ./backend
    container_name: typeform-clone-backend
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app
    environment:
      - DATABASE_URL=sqlite:///./typeform_clone.db
      - FRONTEND_ORIGIN=http://localhost:3000
      - PUBLIC_BASE_URL=http://localhost:3000/f
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: typeform-clone-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  backend-data:
